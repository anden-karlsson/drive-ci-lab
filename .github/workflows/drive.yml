name: drive

on:
  repository_dispatch:
    types: [drive-upload] # triggers workflow upon upload to drive. invented by me.

concurrency:
  group: ${{ github.ref }} # each branch has its own concurrency group, so that runs on different branches don't cancel each other out.
  cancel-in-progress: false # would cancel any in-progress runs of this workflow if a new run is triggered.

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install google-api-python-client google-auth
      - name: download files from Drive
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
          GDRIVE_FOLDER_ID: ${{ vars.GDRIVE_FOLDER_ID }}
          FILE_NAMES_JSON: ${{ toJSON(github.event.client_payload.file_names) }}
        run: |
          echo "batch: ${FILE_NAMES_JSON}"
          echo "${FILE_NAMES_JSON}" | jq -r '.[]' | while IFS= read -r name; do
            echo "── processing: ${name}"
            python run.py --download "${name}"
          done